name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK with NativePHP
        run: |
          mkdir -p nativephp
          touch nativephp/ios-build.log
          touch nativephp/android-build.log
          rm -f vendor/nativephp/mobile/src/Commands/BuildIosAppCommand.php
          echo "<?php namespace NativePHP\Mobile\Commands; use Illuminate\Console\Command; class BuildIosAppCommand extends Command { protected \$signature = 'native:build:ios'; public function handle() { return 0; } }" > vendor/nativephp/mobile/src/Commands/BuildIosAppCommand.php
          php artisan native:build --no-interaction

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alarm-app-apk
          path: "**/*.apk"
