name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, iconv, json, libxml, openssl, pcre, phar, simplexml, spl, tokenizer, xmlwriter, zip
          coverage: none

      - name: Install Dependencies
        run: |
          composer install --no-interaction --prefer-dist
          # Laravel needs an app key to run commands
          cp .env.example .env || touch .env
          php artisan key:generate

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK with NativePHP
        run: |
          mkdir -p nativephp
          touch nativephp/android-build.log

          # Fix: Overwrite the iOS build command to prevent errors on Linux
          # This ensures NativePHP doesn't try to load macOS-specific logic
          cat <<EOF > vendor/nativephp/mobile/src/Commands/BuildIosAppCommand.php
          <?php 
          namespace NativePHP\Mobile\Commands; 
          use Illuminate\Console\Command; 
          class BuildIosAppCommand extends Command { 
              protected \$signature = 'native:build:ios'; 
              public function handle() { return 0; } 
          }
          EOF

          # Build only the android target
          php artisan native:build android --no-interaction

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alarm-app-apk
          path: "**/*.apk"
