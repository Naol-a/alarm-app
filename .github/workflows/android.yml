name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, zip
          coverage: none

      - name: Install Dependencies
        run: |
          # Install normally. This will run package discovery once.
          composer install --no-interaction --prefer-dist
          cp .env.example .env || touch .env
          php artisan key:generate

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK with NativePHP
        run: |
          mkdir -p nativephp
          touch nativephp/android-build.log

          # 1. Overwrite the iOS command with a safety wrapper
          # The 'if (!class_exists)' prevents the "Cannot redeclare" fatal error
          cat <<'EOF' > vendor/nativephp/mobile/src/Commands/BuildIosAppCommand.php
          <?php
          namespace NativePHP\Mobile\Commands;
          use Illuminate\Console\Command;

          if (!class_exists('NativePHP\Mobile\Commands\BuildIosAppCommand')) {
              class BuildIosAppCommand extends Command {
                  protected $signature = 'native:build:ios';
                  public function handle() { return 0; }
              }
          }
          EOF

          # 2. Clear any cached discovery or config that might point to old files
          php artisan config:clear

          # 3. Run the build (Targeting only android)
          php artisan native:build android --no-interaction

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alarm-app-apk
          path: "**/*.apk"
