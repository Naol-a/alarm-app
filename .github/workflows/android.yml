name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, zip
          coverage: none

      - name: Install Dependencies
        run: |
          # 1. Install without running scripts (prevents early crash)
          composer install --no-interaction --prefer-dist --no-scripts

          # 2. Fix the iOS command with the EXACT correct namespace
          # We use 'Native\Mobile\Commands' (NOT NativePHP)
          mkdir -p vendor/nativephp/mobile/src/Commands
          cat <<'EOF' > vendor/nativephp/mobile/src/Commands/BuildIosAppCommand.php
          <?php
          namespace Native\Mobile\Commands;
          use Illuminate\Console\Command;
          class BuildIosAppCommand extends Command {
              protected $signature = 'native:build:ios';
              public function handle() { return 0; }
          }
          EOF

          # 3. Now that the file is fixed, run the autoloader and discovery
          composer dump-autoload

          # 4. Setup Laravel environment
          cp .env.example .env || touch .env
          php artisan key:generate

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK with NativePHP
        run: |
          mkdir -p nativephp
          touch nativephp/android-build.log

          # Clear cache to ensure the new dummy command is registered
          php artisan config:clear

          # Run the build specifically for android
          php artisan native:build android --no-interaction

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alarm-app-apk
          path: "**/*.apk"
      - name: Show Logs on Failure
        if: failure()
        run: |
          [ -f nativephp/android-build.log ] && cat nativephp/android-build.log || echo "No log file found"
