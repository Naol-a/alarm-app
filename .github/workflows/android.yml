name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, zip
          coverage: none

      - name: Install Dependencies
        run: |
          composer install --no-interaction --prefer-dist
          cp .env.example .env || touch .env
          php artisan key:generate

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK with NativePHP
        run: |
          mkdir -p nativephp
          touch nativephp/android-build.log

          # 1. Delete the existing file to avoid class collision
          rm -f vendor/nativephp/mobile/src/Commands/BuildIosAppCommand.php

          # 2. Create the dummy class
          cat <<'EOF' > vendor/nativephp/mobile/src/Commands/BuildIosAppCommand.php
          <?php
          namespace NativePHP\Mobile\Commands;
          use Illuminate\Console\Command;
          class BuildIosAppCommand extends Command {
              protected $signature = 'native:build:ios';
              public function handle() { return 0; }
          }
          EOF

          # 3. Refresh the autoloader to recognize the change
          composer dump-autoload

          # 4. Run the build
          php artisan native:build android --no-interaction

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alarm-app-apk
          path: "**/*.apk"
