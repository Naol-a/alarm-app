name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3" # 8.4 is very new; 8.3 is safer for most NativePHP builds currently
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, zip
          coverage: none

      - name: Install Dependencies
        run: |
          composer install --no-interaction --prefer-dist
          # Create .env file and generate key so artisan commands work
          cp .env.example .env || touch .env
          php artisan key:generate

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK with NativePHP
        run: |
          mkdir -p nativephp
          touch nativephp/android-build.log

          # Cleaner hack to disable the iOS build command that crashes on Linux
          cat <<EOF > vendor/nativephp/mobile/src/Commands/BuildIosAppCommand.php
          <?php 
          namespace NativePHP\Mobile\Commands; 
          use Illuminate\Console\Command; 
          class BuildIosAppCommand extends Command { 
              protected \$signature = 'native:build:ios'; 
              public function handle() { return 0; } 
          }
          EOF

          # Run the build specifically for android (if your version supports the flag)
          # Otherwise, native:build will attempt to build everything
          php artisan native:build android --no-interaction

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alarm-app-apk
          path: "**/*.apk"
