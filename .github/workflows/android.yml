name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, iconv, mysql, pdo_mysql

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create .env file
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Generate App Key
        run: php artisan key:generate

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK with NativePHP
        # እዚህ ጋር 'android' የሚለው ተወግዶ '--mobile' ሆኗል
        run: php artisan native:build --mobile --no-interaction

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alarm-app-apk
          # ማንኛውም ቦታ የተፈጠረ .apk ፋይል እንዲያገኝ path ተስተካክሏል
          path: "**/*.apk"
